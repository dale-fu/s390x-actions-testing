# This workflow is a smoke test for the GitHub Actions runners on s390x.
name: smoke-test

on:
  workflow_dispatch:

jobs:
  smoke-test:
    strategy:
      matrix:
        runner: [ubuntu-24.04-s390x, ubuntu-24.04-s390x-vm]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10

    steps:      
    - name: Basic smoke test
      run: |
        set -e

        echo "### SYSTEM ###"
        whoami
        id
        uname -a
        cat /etc/os-release
        lscpu
        echo

        echo "### SECURITY ###"
        apparmor_status || true
        cat /proc/self/status | grep -i seccomp
        cat /proc/self/status | grep -i cap
        echo

        echo "### SUDO ###"
        sudo -n true && echo "Passwordless sudo: OK" || echo "Passwordless sudo: FAILED"
        cat /etc/sudoers.d/runner 2>/dev/null || echo "No /etc/sudoers.d/runner file"
        echo

        echo "### KERNEL MODULES ###"
        ls /lib/modules/ 2>/dev/null || echo "No /lib/modules"
        echo

        echo "### DISK ###"
        df -h
        echo

        echo "### MEMORY ###"
        free -h
        echo

        echo "### NETWORK (INTERNAL) ###"
        ip a
        ip r
        echo

        echo "### NETWORK (EXTERNAL) ###"
        ping -c 3 google.ca || echo "ICMP blocked"
        curl -I https://api.github.com
