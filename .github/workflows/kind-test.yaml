# This workflow tests building and running a Kind (Kubernetes in Docker) cluster.
# Kind does not publish prebuilt binaries for IBM platforms, so we build from source
# using the linux-on-ibm-z community build script and verification steps.
# Ref: https://github.com/linux-on-ibm-z/docs/wiki/Building-Kind
# Issue: https://github.com/IBM/actionspz/issues/49
name: kind-test

on:
  workflow_dispatch:

jobs:
  kind-test:
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-22.04-s390x-vm
          - ubuntu-24.04-s390x-vm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    steps:
      - name: Build Kind from source
        run: |
          wget https://raw.githubusercontent.com/linux-on-ibm-z/scripts/master/Kind/0.31.0/build_kind.sh
          bash build_kind.sh -y

      - name: Build cross image
        env:
          PATCH_URL: https://raw.githubusercontent.com/linux-on-ibm-z/scripts/master/Kind/0.31.0/patch
          REGISTRY: local
        run: |
          git clone -b v0.19.0 https://github.com/kubernetes/release.git
          cd release
          curl -s $PATCH_URL/release.patch | git apply --ignore-whitespace -
          docker buildx inspect
          cd images/build/cross/
          TARGETPLATFORM=s390x make container

      - name: Build node image
        env:
          REGISTRY: local
        run: |
          export PATH=${PWD}/kind/bin:$PATH
          git clone -b v1.35.1 https://github.com/kubernetes/kubernetes.git
          cd kubernetes
          sed -i 's,v1.35.0-go1.25.6-bullseye.0,v1.35.0-go1.25.6-bookworm.0,g' build/build-image/cross/VERSION
          docker buildx use default
          KUBE_CROSS_IMAGE=${REGISTRY}/kube-cross-s390x kind build node-image
          docker tag kindest/node:latest ${REGISTRY}/kindest/node:latest

      - name: Create cluster and verify
        env:
          REGISTRY: local
        run: |
          export PATH=${PWD}/kind/bin:$PATH

          kind create cluster --image=${REGISTRY}/kindest/node:latest --wait 30s || true
          kind load docker-image kindest/kindnetd:v20251212-v0.29.0-alpha-105-g20ccfc88
          kind load docker-image kindest/local-path-provisioner:v20251212-v0.29.0-alpha-105-g20ccfc88

          echo "Waiting for node and pods to be Ready..."
          docker exec kind-control-plane kubectl wait --for=condition=Ready nodes --all --timeout=300s
          docker exec kind-control-plane kubectl wait --for=condition=Ready pods --all -A --timeout=300s

          docker exec kind-control-plane kubectl get nodes
          docker exec kind-control-plane kubectl get pods -A
          echo "Kind cluster: OK"

      - name: Cleanup
        if: always()
        run: |
          export PATH=${PWD}/kind/bin:$PATH
          kind delete cluster 2>/dev/null || true
