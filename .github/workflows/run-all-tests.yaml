# This workflow triggers all test workflows at once.
name: run-all-tests

on:
  workflow_dispatch:

permissions:
  actions: write

jobs:
  trigger-all:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger all test workflows
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for workflow in smoke-test falco-test kata-test mtu-test mmdebstrap-test overlayfs-test manageiq-test; do
            echo "Triggering ${workflow}..."
            gh workflow run "${workflow}.yaml" --repo "${{ github.repository }}"
          done
