# This workflow tests VM-specific capabilities that are not available in container runners.
# These tests validate kernel modules, network namespaces, device ioctl, privileged Docker
# operations, mount operations, and IP management — all of which require full VM isolation.
#
# These reproduce limitations reported by the community in https://github.com/IBM/actionspz:
#   - Issue #3:  Falco — seccomp blocks delete_module syscall
#   - Issue #7:  systemd/mkosi — OverlayFS mounts fail, no loopback device, nested containers restricted
#   - Issue #33: kernel-patches/bpf — requires nested virtualization (KVM)
#   - Issue #38: Ruby — nproc --all reports host CPUs instead of allocated
#   - Issue #43: Kata Containers — no kernel modules, ioctl on /dev/random denied, can't add IP addresses,
#                network namespaces break DNS in Docker-in-Docker
#   - Issue #44: Confidential Containers — LUKS2/dm-crypt blocked, nbd module missing
#   - Issue #49: KEDA — kind cluster needs privileged containers (separate kind-test.yaml)
#   - Issue #63: opendatahub-io/notebooks — AppArmor blocks podman/buildah socket() by binary path
#   - Issue #68: Docker rlimit + sysctl permission denied in LXC
#   - Issue #78: ManageIQ — AppArmor blocks privileged Docker operations (mock command)
#   - Issue #110: AlmaLinux OS — KVM/QEMU needed for Packer VM provisioning
name: vm-smoke-test

on:
  workflow_dispatch:

jobs:
  vm-smoke-test:
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-22.04-s390x-vm
          - ubuntu-24.04-s390x-vm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15

    steps:
      # Issue #43: Kata reported "no files at /lib/modules" and could not load kernel modules.
      - name: Kernel modules
        run: |
          echo "=== Loaded modules ==="
          lsmod | head -20

          echo "=== Available modules ==="
          ls /lib/modules/$(uname -r)/kernel/ | head -10

          echo "=== Load a module ==="
          sudo modprobe loop && echo "modprobe loop: OK"
          lsmod | grep loop || echo "loop module is built-in (not loadable)"

      # Issue #43: mmdebstrap creates network namespaces that break DNS on container runners.
      - name: Network namespaces
        run: |
          sudo ip netns add test-ns
          sudo ip netns exec test-ns ip link set lo up
          sudo ip netns exec test-ns ip a
          sudo ip netns delete test-ns
          echo "Network namespace: OK"

      # Issue #43: Kata reported "Add an IP address (neither IPv4 nor IPv6)" fails.
      - name: IP address management
        run: |
          sudo ip link add dummy0 type dummy
          sudo ip addr add 192.168.99.1/24 dev dummy0
          sudo ip link set dummy0 up
          ip addr show dummy0
          sudo ip link delete dummy0
          echo "IP management: OK"

      # Issue #43: Kata reported "Make ioctl against /dev/random" fails.
      - name: Device ioctl
        run: |
          python3 -c "
          import fcntl, os, struct
          fd = os.open('/dev/random', os.O_RDONLY)
          # RNDGETENTCNT = 0x80045200
          buf = fcntl.ioctl(fd, 0x80045200, b'\x00' * 4)
          entropy = struct.unpack('I', buf)[0]
          print(f'Entropy available: {entropy}')
          os.close(fd)
          print('ioctl /dev/random: OK')
          "

      # Issue #7: systemd/mkosi requires mount/umount and loopback devices for image builds.
      - name: Mount operations
        run: |
          sudo mkdir -p /mnt/test-tmpfs
          sudo mount -t tmpfs -o size=16M tmpfs /mnt/test-tmpfs
          echo "hello" | sudo tee /mnt/test-tmpfs/test.txt
          cat /mnt/test-tmpfs/test.txt
          sudo umount /mnt/test-tmpfs
          sudo rmdir /mnt/test-tmpfs
          echo "Mount/umount: OK"

      # Issue #7: systemd/mkosi requires OverlayFS mounts on Btrfs.
      - name: OverlayFS mount
        run: |
          mkdir -p /tmp/overlay/{lower,upper,work,merged}
          echo "test" > /tmp/overlay/lower/file.txt
          sudo mount -t overlay overlay \
            -o lowerdir=/tmp/overlay/lower,upperdir=/tmp/overlay/upper,workdir=/tmp/overlay/work \
            /tmp/overlay/merged
          cat /tmp/overlay/merged/file.txt
          sudo umount /tmp/overlay/merged
          echo "OverlayFS: OK"

      # Issue #78: ManageIQ needs --privileged Docker for mock builds.
      # Issue #7: systemd needs nested containers with full capabilities.
      - name: Privileged Docker
        run: |
          docker run --privileged --rm alpine sh -c '
            echo "=== Inside privileged container ==="
            cat /proc/self/status | grep -i seccomp
            cat /proc/self/status | grep -i cap
            ip link add dummy0 type dummy 2>/dev/null && echo "IP link in container: OK"
            mount -t tmpfs tmpfs /tmp && echo "Mount in container: OK"
          '

      # Issue #3: Falco requires delete_module syscall which seccomp blocks in containers.
      - name: Syscall access (delete_module)
        run: |
          cat > /tmp/test_syscall.c << 'EOF'
          #include <fcntl.h>
          #include <sys/syscall.h>
          #include <unistd.h>
          #include <stdio.h>
          #include <errno.h>
          #include <string.h>
          int main() {
            long res = syscall(__NR_delete_module, "nonexistent", O_NONBLOCK);
            printf("delete_module: res=%ld, errno=%d (%s)\n", res, errno, strerror(errno));
            if (errno == 2) { printf("OK: syscall reached kernel (ENOENT)\n"); return 0; }
            if (errno == 38) { printf("FAIL: syscall blocked (ENOSYS)\n"); return 1; }
            return 1;
          }
          EOF
          gcc /tmp/test_syscall.c -o /tmp/test_syscall
          sudo /tmp/test_syscall

      # Issue #44: Confidential Containers needs dm-crypt and nbd kernel modules.
      - name: LUKS2 and nbd module
        run: |
          sudo modprobe dm_crypt && echo "dm_crypt: OK"
          sudo modprobe nbd && echo "nbd: OK"
          ls /dev/nbd0 && echo "/dev/nbd0: OK"
          dd if=/dev/zero of=/tmp/test-luks.img bs=1M count=32
          echo -n "testpassword" | sudo cryptsetup luksFormat --type luks2 --batch-mode --key-file=- /tmp/test-luks.img
          echo -n "testpassword" | sudo cryptsetup open --type luks2 --key-file=- /tmp/test-luks.img test-luks
          sudo cryptsetup close test-luks
          rm -f /tmp/test-luks.img
          echo "LUKS2: OK"

      # Issue #63: opendatahub-io/notebooks — AppArmor blocks podman/buildah socket() on s390x containers.
      # On container runners, podman gets "socket: permission denied" for all DNS lookups.
      - name: Podman networking
        run: |
          if command -v podman &>/dev/null; then
            sudo apt-get install -y slirp4netns 2>/dev/null || true
            podman run --rm docker.io/library/alpine:latest nslookup google.com && echo "Podman DNS: OK"
          else
            echo "Podman not installed, skipping"
          fi

      # Issue #68: Docker rlimit and sysctl access denied in LXC environments.
      - name: Docker rlimit and sysctl
        run: |
          docker run --rm --ulimit nofile=65536:65536 alpine sh -c 'ulimit -n && echo "rlimit: OK"'
          cat /proc/sys/net/ipv4/ip_unprivileged_port_start && echo "sysctl read: OK"
          echo "Docker rlimit/sysctl: OK"

      # Issue #38: Container cgroup exposes wrong CPU count via nproc --all.
      - name: CPU count accuracy
        run: |
          NPROC=$(nproc)
          NPROC_ALL=$(nproc --all)
          CPUINFO=$(grep -c ^processor /proc/cpuinfo)
          echo "nproc: ${NPROC}"
          echo "nproc --all: ${NPROC_ALL}"
          echo "/proc/cpuinfo: ${CPUINFO}"
          if [ "$NPROC_ALL" -le 16 ]; then
            echo "CPU count: OK (reasonable)"
          else
            echo "WARNING: nproc --all reports ${NPROC_ALL} CPUs — may be exposing host CPU count"
          fi

      # Issue #33, #110: Nested virtualization (KVM) for kernel testing and VM provisioning.
      - name: KVM availability
        run: |
          if [ -e /dev/kvm ]; then
            ls -la /dev/kvm
            echo "KVM: available"
          else
            echo "KVM: not available (nested virt not supported)"
          fi
